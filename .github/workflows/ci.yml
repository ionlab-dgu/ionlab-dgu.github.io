name: CI

on:
  pull_request:
  push:
    branches: [main]

# 동시에 여러 번 돌 필요는 없습니다. 새 커밋이 오면 이전 실행을 취소합니다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: 타입 검사 · 빌드
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 타입 검사
        run: pnpm check

      # private 오버레이 없이도 빌드가 성공해야 합니다.
      # CI에는 .private/ 가 없으므로, 이 job 자체가 그 검증입니다.
      - name: 공개 빌드
        run: pnpm build:public

      - name: private 격리 확인
        run: node scripts/verify-public-build.mjs
