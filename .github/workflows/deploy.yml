name: Deploy

# 이 저장소(ionlab-dgu/ionlab-dgu.github.io)가 곧 org 사이트이므로
# GitHub Pages 네이티브 배포를 씁니다. 별도 저장소로 push하지 않으니 PAT가 필요 없습니다.
#
# ⚠️ 빌드는 **항상 pnpm build:public** (PUBLIC_ONLY=1) 으로 합니다.
#    private 저장소를 checkout 하지 않으며, 설령 있더라도 읽지 않습니다.
#    민감 콘텐츠가 공개 사이트에 올라가지 않게 하는 것이 이 워크플로의 첫 번째 책임입니다.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write # Pages에 배포
  id-token: write # OIDC로 배포 신원 확인 (deploy-pages 요구사항)

# 배포는 중간에 끊지 않습니다. 진행 중인 배포가 있으면 끝날 때까지 기다립니다.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 빌드
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 타입 검사
        run: pnpm check

      # private 저장소를 checkout 하지 않으므로 .private/ 는 존재하지 않아야 합니다.
      # 혹시라도 있으면 (캐시 오염 등) 배포를 멈춥니다.
      - name: private 오버레이가 없는지 확인
        run: |
          if [ -e .private ]; then
            echo "::error::.private/ 가 존재합니다. 공개 배포에 비공개 콘텐츠가 섞일 수 있어 중단합니다."
            exit 1
          fi
          echo ".private/ 없음 — 공개 빌드 진행"

      - uses: actions/configure-pages@v5

      - name: 공개 빌드
        run: pnpm build:public
        env:
          # 공개 캘린더만 빌드에 포함합니다. 비공개 캘린더 주소는 여기에 넣지 마세요.
          GCAL_ICAL_SEMINARS: ${{ secrets.GCAL_ICAL_SEMINARS }}

      # 아티팩트를 올리기 전에 검사합니다 — 통과하지 못하면 배포 대상 자체가 만들어지지 않습니다.
      - name: 격리 검사
        run: pnpm verify:public

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: 배포
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
