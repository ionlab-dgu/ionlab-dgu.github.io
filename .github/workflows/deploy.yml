name: Deploy

# 공개 사이트를 ionlab-dgu.github.io 저장소로 배포합니다.
#
# ⚠️ 이 워크플로는 **항상 pnpm build:public** 으로 빌드합니다 (PUBLIC_ONLY=1).
#    private 저장소를 checkout 하지 않으며, 설령 있더라도 읽지 않습니다.
#    민감 콘텐츠가 공개 사이트에 올라가지 않게 하는 것이 이 워크플로의 첫 번째 책임입니다.
#
# 필요한 설정 (Settings → Secrets and variables → Actions):
#   PAGES_DEPLOY_TOKEN — ionlab-dgu/ionlab-dgu.github.io 에 push 권한이 있는 PAT
#                        (Fine-grained token: Contents = Read and write)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false # 배포는 중간에 끊지 않습니다

jobs:
  deploy:
    name: 빌드 · 배포
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 타입 검사
        run: pnpm check

      # private 저장소를 checkout 하지 않으므로 .private/ 는 존재하지 않아야 합니다.
      # 혹시라도 있으면 (캐시 오염 등) 배포를 멈춥니다.
      - name: private 오버레이가 없는지 확인
        run: |
          if [ -e .private ]; then
            echo "::error::.private/ 가 존재합니다. 공개 배포에 비공개 콘텐츠가 섞일 수 있어 중단합니다."
            exit 1
          fi
          echo ".private/ 없음 — 공개 빌드 진행"

      - name: 공개 빌드
        run: pnpm build:public
        env:
          # 공개 캘린더만 빌드에 포함합니다. 비공개 캘린더 주소는 여기에 넣지 마세요.
          GCAL_ICAL_SEMINARS: ${{ secrets.GCAL_ICAL_SEMINARS }}

      - name: 격리 검사
        run: node scripts/verify-public-build.mjs

      - name: ionlab-dgu.github.io 로 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: ionlab-dgu/ionlab-dgu.github.io
          publish_branch: main
          publish_dir: ./dist
          # 소스 저장소의 커밋을 그대로 추적할 수 있게 메시지에 남깁니다.
          commit_message: 'deploy: ${{ github.sha }} (lab-os)'
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
